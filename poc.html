<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GameBoost Verification</title>

  <!-- Ensure full Referer is sent -->
  <meta name="referrer" content="unsafe-url">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
      background: #f5f5f5;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Verifying your session...</h2>
  <p>Please wait while we continue.</p>

  <!-- Fallback manual click -->
  <a class="btn" href="https://gameboost.com/otp/send-login">
    Click here if not redirected
  </a>
</div>

<script>
  // Auto redirect after short delay
  setTimeout(function() {
    window.location.href = "https://gameboost.com/otp/send-login";
  }, 1000);
</script>

</body>
</html>
